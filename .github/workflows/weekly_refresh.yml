# .github/workflows/weekly_refresh.yml
# ─────────────────────────────────────────────────────────────────────────────
# UAE Talent Intelligence — Automated Weekly Pipeline
# Runs every Monday at 06:00 UAE time (02:00 UTC)
# ─────────────────────────────────────────────────────────────────────────────

name: Weekly ETL Refresh

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday at 02:00 UTC (06:00 UAE/GST)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  etl:
    name: Run ETL Pipeline → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/raw data/processed data/reference

      - name: Copy reference files
        run: |
          cp data/reference/uae_salary_benchmarks.csv data/reference/ 2>/dev/null || true
          cp data/reference/company_profiles.csv      data/reference/ 2>/dev/null || true

      - name: Run pipeline (fetch → transform → ML → load to Supabase)
        env:
          DB_TARGET:            supabase
          SUPABASE_DB_URL:      ${{ secrets.SUPABASE_DB_URL }}
          RAPIDAPI_KEY:         ${{ secrets.RAPIDAPI_KEY }}
          ADZUNA_APP_ID:        ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:       ${{ secrets.ADZUNA_APP_KEY }}
          EXCHANGE_API_KEY:     ${{ secrets.EXCHANGE_API_KEY }}
          OPENCORPORATES_API_KEY: ${{ secrets.OPENCORPORATES_API_KEY }}
        run: python run_pipeline.py

      - name: Upload processed data as artefact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_number }}
          path: |
            data/processed/transform_meta.json
          retention-days: 14

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Pipeline failed — run #${context.runNumber}`,
              body:  `The weekly ETL pipeline failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ["pipeline-failure"],
            });