# .github/workflows/weekly_refresh.yml
# ─────────────────────────────────────────────────────────────────────────────
# UAE Talent Intelligence — Automated Weekly Pipeline  (v2 — production-grade)
#
# Runs every Monday at 06:00 UAE time (02:00 UTC).
# Now surfaces run_id, structured logs, and uploads both metadata + logs
# as build artifacts so every run is traceable without DB access.
# ─────────────────────────────────────────────────────────────────────────────

name: Weekly ETL Refresh

on:
  schedule:
    - cron: "0 2 * * 1"    # Every Monday at 02:00 UTC (06:00 UAE/GST)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions UI

env:
  PYTHON_VERSION: "3.11"

jobs:
  etl:
    name: Run ETL Pipeline → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data/raw data/processed data/reference logs

      - name: Copy reference files from repo
        run: |
          # Reference files are committed to the repo (not gitignored)
          cp data/reference/uae_salary_benchmarks.csv data/reference/ 2>/dev/null || echo "⚠  uae_salary_benchmarks.csv not found — L5 imputation will be skipped"
          cp data/reference/company_profiles.csv      data/reference/ 2>/dev/null || echo "⚠  company_profiles.csv not found — enrichment fallback will be used"

      # ── Run pipeline ────────────────────────────────────────────────────────

      - name: Run ETL pipeline (fetch → transform → ML → load to Supabase)
        id: run_pipeline
        env:
          DB_TARGET:               supabase
          SUPABASE_DB_URL:         ${{ secrets.SUPABASE_DB_URL }}
          RAPIDAPI_KEY:            ${{ secrets.RAPIDAPI_KEY }}
          ADZUNA_APP_ID:           ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:          ${{ secrets.ADZUNA_APP_KEY }}
          EXCHANGE_API_KEY:        ${{ secrets.EXCHANGE_API_KEY }}
          OPENCORPORATES_API_KEY:  ${{ secrets.OPENCORPORATES_API_KEY }}
        run: |
          python run_pipeline.py
          echo "Pipeline exit code: $?"

      # ── Artifacts — always uploaded so failures are debuggable ─────────────

      - name: Upload pipeline metadata and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts-run-${{ github.run_number }}
          path: |
            data/processed/transform_meta.json
            logs/
          retention-days: 30

      # ── Failure notifications ───────────────────────────────────────────────

      - name: Open GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date   = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🔴 Pipeline failed — run #${context.runNumber} (${date})`,
              body: [
                `## Weekly ETL pipeline failed`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Run   | [#${context.runNumber}](${runUrl}) |`,
                `| Date  | ${date} |`,
                `| Trigger | \`${context.eventName}\` |`,
                ``,
                `**Next steps:**`,
                `1. Check the [Actions log](${runUrl}) for the full error`,
                `2. Download the \`pipeline-artifacts\` artifact for transform_meta.json and logs`,
                `3. Re-run manually after fixing: Actions → Weekly ETL Refresh → Run workflow`,
                ``,
                `> This issue was opened automatically by the pipeline failure handler.`,
              ].join('\n'),
              labels: ['pipeline-failure', 'automated'],
            });

      # ── Success summary ─────────────────────────────────────────────────────

      - name: Print pipeline summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Pipeline completed successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f data/processed/transform_meta.json ]; then
            python -c "
          import json
          with open('data/processed/transform_meta.json') as f:
              m = json.load(f)
          print(f\"  run_id       : {m.get('run_id', 'n/a')}\")
          print(f\"  total_jobs   : {m.get('total_jobs', 0):,}\")
          print(f\"  salary_cov   : {m.get('salary_coverage_pct', 0)}%\")
          print(f\"  avg_complete : {m.get('avg_completeness', 0)}%\")
          print(f\"  avg_conf     : {m.get('avg_confidence', 0)}\")
            "
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"